name: Docker 容器部署

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  DOCKER_IMAGE: teaching-system
  DOCKER_TAG: latest

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
      
      - name: 🐳 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: 🔨 构建 Docker 镜像
        run: |
          docker build -t ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }} .
      
      - name: 💾 保存镜像
        run: |
          docker save ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }} | gzip > image.tar.gz
      
      - name: 📤 上传镜像到服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "image.tar.gz"
          target: "/tmp/"
      
      - name: 🚀 部署容器
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            cd /tmp
            
            # 加载镜像
            docker load < image.tar.gz
            
            # 停止旧容器
            docker stop teaching-system || true
            docker rm teaching-system || true
            
            # 启动新容器
            docker run -d \
              --name teaching-system \
              --restart always \
              -p 3002:3002 \
              ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
            
            # 清理
            rm image.tar.gz
            
            echo "✅ 容器部署完成！"
            docker ps | grep teaching-system
